<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"/>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"/>
    <link rel="stylesheet" href="./Css/second.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"/>
  </head>
  <body>
    <header>
      <nav class="container mb-2">
        <div class="d-flex justify-content-between align-items-center mt-3">
          <div class="d-flex justify-content-center align-items-center gap-2">
            <img src="./image/logo.svg" alt="" />
            <span class="mt-2" style="font-weight: 900; font-size: 26px">ExamPlus</span>
          </div>
          <div class="d-flex justify-content-center align-items-center gap-4">
            <span><a href="#">Home</a></span>
            <span><a href="#">Features</a></span>
            <span><a href="#">Exam</a></span>
            <span><a href="#">Mock Test</a></span>
            <span><a href="#">About</a></span>
          </div>
          <div class="d-flex justify-content-center align-items-center gap-3">
            <div class="button-wrapper btn btn-primary rounded">Login</div>
            <div
              class="button-wrapper btn btn-primary rounded"
              style="background-color: #000151; color: #ffffff">
              Sign Up
            </div>
          </div>
        </div>
      </nav>
    </header>
    <section>
      <div class="container">
        <div class="text-center mt-2">
          <span style="font-weight: 600; font-size: 60px">Welcome Back</span>
          <span
            class="text-center mt-2 d-block"
            style="font-weight: 400; font-size: 26px">
            Sign in to your account to continue</span>
        </div>
        <div class="sign-box mx-auto mt-4 mb-3 p-5">
          <div>
            <label
              for=""
              style="color: #ffffff; font-weight: 400; font-size: 22px"
              class="mb-3"
              >Email Address</label><br />
            <div class="custom-input">
              <i class="fa-regular fa-envelope input-icon"></i>
              <input type="email" placeholder="student@example.com" required />
            </div>
          </div>
          <div>
            <label
              for=""
              style="color: #ffffff; font-weight: 400; font-size: 22px"
              class="mb-2 mt-3">Password</label><br />
            <div class="custom-input">
              <i class="fa-solid fa-lock input-icon"></i>
              <input
                type="password"
                placeholder="********"
                required
                class="mt-2"/>
            </div>
          </div>
          <div>
            <label
              for=""
              style="color: #ffffff; font-weight: 400; font-size: 22px"
              class="mb-3 mt-3">Login As</label><br />
            <div class="custom-input">
              <i class="fa-solid fa-user input-icon"></i>
              <input type="text" placeholder="Student" required />
            </div>
          </div>
          <div class="d-flex justify-content-between mt-3">
            <span style="color: #ffffff; font-weight: 400; font-size: 20px">Remember me</span>
            <span style="color: #ffffff; font-weight: 400; font-size: 20px">Forgot Password?</span>
          </div>
          <div class="justify-content-center d-flex mt-5">
            <button class="sign-button">Sign in</button>
          </div>
          <div class="justify-content-center align-items-center mt-3 d-flex gap-2 conform-text">
            <span style="color: #d9d9d9">Don't have an account?</span>
            <span style="color: #ffffff">Sign Up Now</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
