<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Craete Exam Room</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./Css/fourth.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="exam-box">
      <div class="container mt-2 mb-2">
        <div class="d-flex align-items-center gap-3">
          <div
            class="d-flex left-arrow align-items-center justify-content-center"
          >
            <i class="fa-solid fa-arrow-left-long"></i>
          </div>
          <div>
            <span style="font-weight: 400; font-size: 32px"
              >Create Exam Room</span
            >
            <span
              class="d-block"
              style="font-weight: 400; font-size: 18px; color: #9e9e9e"
              >Set up a new examination room</span
            >
          </div>
        </div>
      </div>
    </header>
    <section>
      <div class="container">
        <div class="first-box mt-5 p-4">
          <div class="d-flex gap-2 align-items-center mt-2">
            <i
              class="fa-solid fa-gear"
              style="color: blue; font-size: 25px"
            ></i>
            <span style="font-weight: 400; font-size: 32px"
              >Basic Information</span
            >
          </div>
          <div class="exam">
            <label for="" class="mb-2" style="font-weight: 400; font-size: 25px"
              >Exam Name*</label
            ><br />
            <input type="text" required class="label-box p-4" />
          </div>
          <div class="exam d-flex justify-content-between">
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >Exam Type*</label
              ><br />
              <input type="text" required class="input-box p-4" />
            </div>
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >Duration (Minutes)*</label
              ><br />
              <input type="text" required class="input-box p-4" />
            </div>
          </div>
        </div>
        <div class="first-box mt-5 p-4">
          <div class="d-flex gap-2 align-items-center mt-2">
            <i
              class="fa-chisel fa-regular fa-calendar"
              style="color: blue; font-size: 25px"
            ></i>
            <span style="font-weight: 400; font-size: 32px">Schedule</span>
          </div>
          <div class="exam d-flex justify-content-between">
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >Start Time Date</label
              ><br />
              <input
                type="date"
                required
                class="input-box p-4"
                style="cursor: text"
              />
            </div>
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >End Time Date</label
              ><br />
              <input
                type="date"
                required
                class="input-box p-4"
                style="cursor: text"
              />
            </div>
          </div>
          <div class="exam d-flex justify-content-between">
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >Time</label
              ><br />
              <input
                type="time"
                required
                class="input-box p-4"
                style="cursor: text"
              />
            </div>
            <div class="mt-3">
              <label
                for=""
                class="mb-2"
                style="font-weight: 400; font-size: 25px"
                >Time</label
              ><br />
              <input
                type="time"
                required
                class="input-box p-4"
                style="cursor: text"
              />
            </div>
          </div>
        </div>
        <div class="second-box mt-5 p-4">
          <div class="d-flex gap-2 align-items-center mt-2">
            <i
              class="fa-solid fa-gear"
              style="color: blue; font-size: 25px"
            ></i>
            <span style="font-weight: 400; font-size: 32px">Exam Settings</span>
          </div>
          <div class="exam">
            <div
              class="mt-2 d-flex second-child-box align-items-center p-4 mt-3 justify-content-between"
            >
              <div class="d-flex align-items-center gap-3">
                <div
                  class="p-2 border rounded-3"
                  style="background-color: #d573d9"
                >
                  <i class="fa-regular fa-clock" style="font-size: 25px"></i>
                </div>
                <div class="">
                  <span
                    class="d-block"
                    style="font-weight: 400; font-size: 32px"
                    >Shuffle Questions</span
                  >
                  <span
                    class="d-block"
                    style="font-weight: 300; font-size: 26px; color: #353535"
                    >Randomize question and answer order</span
                  >
                </div>
              </div>
              <div class="toggle">
                <input type="checkbox" id="check" style="display: none" />
                <label for="check" class="toggle-button"></label>
              </div>
            </div>
          </div>
          <div class="exam">
            <div
              class="mt-2 d-flex second-child-box align-items-center p-4 mt-4 justify-content-between"
            >
              <div class="d-flex align-items-center gap-3">
                <div
                  class="p-2 border rounded-3"
                  style="background-color: #94b9eb"
                >
                  <i class="fa-solid fa-image" style="font-size: 25px"></i>
                </div>
                <div class="">
                  <span
                    class="d-block"
                    style="font-weight: 400; font-size: 32px"
                    >Image-to-Text Extraction</span
                  >
                  <span
                    class="d-block"
                    style="font-weight: 300; font-size: 26px; color: #353535"
                    >Enable OCR for uploaded images</span
                  >
                </div>
              </div>
              <div class="toggle">
                <input type="checkbox" id="check1" style="display: none" />
                <label for="check1" class="toggle-button"></label>
              </div>
            </div>
          </div>
          <div class="d-flex align-items-center gap-3 mt-2">
            <i
              class="fa-regular fa-eye"
              style="color: blue; font-size: 25px"
            ></i>
            <span style="font-weight: 400; font-size: 32px"
              >Room Visibility</span
            >
          </div>
          <div class="d-flex justify-content-between mt-3 exam">
            <div class="p-2">
              <button class="p-3 footer-button">Private (code)</button>
            </div>
            <div class="p-2">
              <button class="p-3 footer-button">Public(Open Access)</button>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-between mt-5 mb-3">
          <div class=""><button class="cancel-button">Cancel</button></div>
          <div>
            <button
              style="
                width: 543px;
                height: 75px;
                font-size: 26px;
                font-weight: 400;
                background-color: #000151;
                color: #ffff;
                border-radius: 26px;
                border: 1px solid #9e9e9e;
              "
            >
              Create Room & Add Questions
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
